# This project was developed with assistance from AI tools.
#
# Hardened Podman Compose for OpenClaw sandbox.
# See docs/threat-model.md for the full threat model and rationale.

services:
  openclaw:
    container_name: openclaw-sandbox
    image: quay.io/jary/openclaw-sandbox:latest
    user: "1000:1000"

    # --- Config ---
    environment:
      - OPENCLAW_CONFIG_PATH=/config/openclaw.json

    # --- Ports ---
    ports:
      - "127.0.0.1:18789:18789"

    # --- Filesystem ---
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid,nodev

    volumes:
      - ./openclaw-state:/home/openclaw/.openclaw     # OpenClaw runtime state (read-write)
      - ./workspace:/workspace                       # Disposable agent workspace (read-write)
      - ./config/openclaw.json:/config/openclaw.json:ro  # OpenClaw config (read-only)
      - ./config/SOUL.md:/config/SOUL.md:ro              # Agent personality (read-only)

    # --- Secrets (from Podman encrypted secret store) ---
    secrets:
      - anthropic_api_key
      - gateway_token

    # --- Capabilities ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    pids_limit: 100

    # --- Network ---
    networks:
      - openclaw-isolated

    # --- Health check ---
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # --- Restart policy ---
    restart: unless-stopped

# --- Secrets (from Podman encrypted secret store) ---
secrets:
  anthropic_api_key:
    external: true
  gateway_token:
    external: true

# --- Isolated network ---
networks:
  openclaw-isolated:
    driver: bridge
    internal: false   # Needs external access for LLM API calls
    driver_opts:
      com.docker.network.bridge.name: br-openclaw
