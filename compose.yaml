# This project was developed with assistance from AI tools.
#
# Podman Compose for OpenClaw gateway with built-in sandbox.
# Gateway spawns sandbox containers via host Podman socket.
# See docs/threat-model.md for the full threat model and rationale.

services:
  openclaw:
    container_name: openclaw-gateway
    build: .
    userns_mode: keep-id

    # --- Config ---
    environment:
      - OPENCLAW_CONFIG_PATH=/config/openclaw.json

    # --- Ports (localhost only -- external access via TLS proxy) ---
    # No host port binding -- caddy proxy handles external access.

    # --- Filesystem ---
    # Gateway needs write access for state and sandbox management.
    # Sandbox containers are the isolation boundary (network:none, capDrop:ALL).
    tmpfs:
      - /tmp:size=100m,nosuid,nodev

    volumes:
      - ./openclaw-state:/home/node/.openclaw          # OpenClaw runtime state (read-write)
      - ./workspace:/workspace                          # Agent workspace (read-write)
      - ./config/openclaw.json:/config/openclaw.json:ro # OpenClaw config (read-only)
      - ./config/SOUL.md:/config/SOUL.md:ro             # Agent personality (read-only)
      - /tmp/openclaw-secrets:/secrets:ro                # Vault-rendered secrets (read-only)
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock  # Podman socket for sandbox mgmt

    # --- Capabilities ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

    # --- Network ---
    networks:
      - openclaw-net

    # --- Health check ---
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # --- Restart policy ---
    restart: unless-stopped

  # --- TLS reverse proxy for Control UI access ---
  caddy:
    container_name: openclaw-proxy
    image: docker.io/library/caddy:2-alpine
    ports:
      - "0.0.0.0:18790:18790"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./tls:/tls:ro
    networks:
      - openclaw-net
    restart: unless-stopped

# --- Network ---
networks:
  openclaw-net:
    driver: bridge
    internal: false   # Needs external access for LLM API calls
    driver_opts:
      com.docker.network.bridge.name: br-openclaw
